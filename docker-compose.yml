version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    volumes:
      - .:/workspace
    environment:
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://ollama:11434}
    ports:
      - "8000:8000" # MkDocs server port
    depends_on:
      neo4j:
        condition: service_healthy
      ollama:
        condition: service_healthy
    # Using restart unless-stopped to keep it ready in CI environments if needed
    restart: unless-stopped
    command: sleep infinity

  neo4j:
    # Use fixed LTS version instead of latest
    image: neo4j:5.21.0
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH:-neo4j/password}
    ports:
      - "7474:7474" # HTTP (Neo4j Browser)
      - "7687:7687" # Bolt
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 15s

  ollama:
    # Use fixed version instead of latest
    image: ollama/ollama:0.2.7
    ports:
      - "11434:11434" # API / Web
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/ || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 15s
    # GPU Configuration (Requires Docker Desktop with WSL2 and GPU pass-through on Windows 11)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  neo4j_data:
  ollama_data:
