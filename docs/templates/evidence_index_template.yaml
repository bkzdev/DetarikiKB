# Evidence Index Template（Public Evidence Indexの見本）
#
# scripts/validate_evidence_index.py / agents/wiki_generator/evidence_index.py
# が実際に読み込むknowledge/evidence/stories/{storyId}.yamlは、この見本と
# 同じ構造を持つ (docs/architecture/06_AI/Evidence_Index_Design.md 参照)。
#
# このファイル自体は合成データのみで構成されており、実イベント名・実
# キャラクター名・実セリフ・実あらすじは一切含まない。raw dialogue text・
# raw DEC command・local pathは一切含めない (Public Evidence Index方針)。
# Internal Review Evidence Packet (raw textを含みうる内部review用データ)
# はこのファイルの対象外であり、別途workspace/review_packets/evidence/
# 配下で扱う (commit禁止)。

evidenceIndexVersion: 1
