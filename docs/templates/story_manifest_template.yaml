# Story Manifest Template（合成データのみのテンプレート例）
#
# docs/architecture/05_Parser/Story_Manifest_Design.md 準拠。
# schemas/story_manifest.schema.json でschema検証できる。
#
# 重要: このファイルは合成データのみで構成する。実イベント名・実ファイル名・
# 実storyIdは一切使わない (sourceKey/storyId/rawDirectory/rawPathはすべて
# 架空の "990101_sample_event" を使った例)。
#
# title/subtitle/displayTitleはすべてnull (DEC本文からは自動推測しない方針、
# Story_Manifest_Design.md §11)。metadataStatusは候補生成直後を想定し
# 全件 "pending"。
#
# publicStoryId/publicEpisodeId (Story_ID_Policy_Decision.md §7で採用決定):
# 将来の公開Wiki URL用の任意フィールド。候補生成scriptはこのフィールドを
# 生成しないため、常にnullのまま (人間が確定した場合にのみ手動で設定する)。
# 未設定時はstoryId/episodeIdへfallbackする方針 (renderer/paths.pyでの
# 実際の切替はまだ行われていない、Story_Manifest_Design.md §13.2)。
#
# characterId/auxiliaryFiles (Character_Story_ID_Manifest_Design.md §8.1で
# 採用決定、PR Cで実装): CHARACTERカテゴリのstory専用の任意フィールド。
# characterIdは当該storyが紐づくキャラクター (knowledge/dictionaries/
# characters.yamlのconfirmed characterId)。auxiliaryFilesはH_scene変種
# (fileRole: variant)・camera/finish等の演出コマンド専用ファイル
# (fileRole: direction)・img/test/tutorial等の特殊ファイル
# (fileRole: other) を、独立episodeとしてはパースせずstory単位で記録する。
# 下記のCHAR_HS例は合成キャラクター "CHAR_AKAGI_HINA" (Identifier_
# Specification.mdの既存合成例と同じ架空ID) を使った例であり、実キャラ名・
# 実ファイル名ではない。

schemaVersion: "0.1.0"
documentType: "story_manifest"
stories:
  - storyId: "EVT_990101_SAMPLE_EVENT"
    publicStoryId: null
    category: "event"
    sourceKey: "990101_sample_event"
    title: null
    displayTitle: null
    metadataStatus: "pending"
    rawDirectory: "EVENT/csl_script_event_990101_sample_event_export"
    notes: "Synthetic example only. Generated by scripts/build_story_manifest_candidates.py."
    episodes:
      - episodeId: "EVT_990101_SAMPLE_EVENT_E01"
        publicEpisodeId: null
        episodeNumber: 1
        subtitle: null
        displayTitle: null
        rawPath: "EVENT/csl_script_event_990101_sample_event_export/CAB-csl_script_event_990101_sample_event-episode1.dec"
        sourceFileName: "CAB-csl_script_event_990101_sample_event-episode1.dec"
        metadataStatus: "pending"
        notes: null
      - episodeId: "EVT_990101_SAMPLE_EVENT_E02"
        publicEpisodeId: null
        episodeNumber: 2
        subtitle: null
        displayTitle: null
        rawPath: "EVENT/csl_script_event_990101_sample_event_export/CAB-csl_script_event_990101_sample_event-episode2.dec"
        sourceFileName: "CAB-csl_script_event_990101_sample_event-episode2.dec"
        metadataStatus: "pending"
        notes: null

  # CHARACTERカテゴリの例 (Character_Story_ID_Manifest_Design.md §4・§8)。
  # 合成キャラクター "CHAR_AKAGI_HINA" (sourceCharacterId "990102"、
  # いずれも架空の値) の CHAR_HS story。characterId/auxiliaryFilesの
  # 使用例を示すため、H_sceneN本体1件・H_scene_s 1件・auxiliaryFiles
  # (variant/direction/other 各1件) を含む。
  - storyId: "CHAR_HS_AKAGI_HINA"
    publicStoryId: null
    characterId: "CHAR_AKAGI_HINA"
    category: "character"
    sourceKey: "990102"
    title: null
    displayTitle: null
    metadataStatus: "pending"
    rawDirectory: "CHARACTER/csl_script_charastory_character990102_export"
    notes: "Synthetic example only. Generated by scripts/build_story_manifest_candidates.py."
    auxiliaryFiles:
      - rawPath: "CHARACTER/csl_script_charastory_character990102_export/CAB-csl_script_charastory_character990102-H_scene6_n.dec"
        sourceFileName: "CAB-csl_script_charastory_character990102-H_scene6_n.dec"
        fileRole: "variant"
        notes: null
      - rawPath: "CHARACTER/csl_script_charastory_character990102_export/CAB-csl_script_charastory_character990102-camera6.dec"
        sourceFileName: "CAB-csl_script_charastory_character990102-camera6.dec"
        fileRole: "direction"
        notes: null
      - rawPath: "CHARACTER/csl_script_charastory_character990102_export/CAB-csl_script_charastory_character990102-H_scene6_img.dec"
        sourceFileName: "CAB-csl_script_charastory_character990102-H_scene6_img.dec"
        fileRole: "other"
        notes: null
    episodes:
      - episodeId: "CHAR_HS_AKAGI_HINA_E06"
        publicEpisodeId: null
        episodeNumber: 6
        subtitle: null
        displayTitle: null
        rawPath: "CHARACTER/csl_script_charastory_character990102_export/CAB-csl_script_charastory_character990102-H_scene6.dec"
        sourceFileName: "CAB-csl_script_charastory_character990102-H_scene6.dec"
        metadataStatus: "pending"
        notes: null
      - episodeId: "CHAR_HS_AKAGI_HINA_ES01"
        publicEpisodeId: null
        episodeNumber: 1
        subtitle: null
        displayTitle: null
        rawPath: "CHARACTER/csl_script_charastory_character990102_export/CAB-csl_script_charastory_character990102-H_scene_s.dec"
        sourceFileName: "CAB-csl_script_charastory_character990102-H_scene_s.dec"
        metadataStatus: "pending"
        notes: null
