# Path: knowledge/dictionaries/characters.yaml
# Version: 0.1
#
# reference/parser/characters_reference.json (読み取り専用レガシー参照、
# CLAUDE.md記載の通り直接改造しない) から displayName を安全に移行した。
# characterId (canonical ID, CHAR_{ROMANIZED_NAME}形式) は
# 人手確認済みのもの (status: confirmed) のみ設定する。
# 未確認のキャラクターは status: name_only のまま characterId: null とし、
# 大量の未確認canonical IDを自動生成しない
# (docs/architecture/06_AI/Canonical_ID_Policy.md §4-5)。
#
# 新しいキャラクターを confirmed にする場合は、人間が
# ローマ字表記を確認した上でcharacterIdを設定し、statusを
# confirmed に変更すること (Identifier_Specification.md §6.1、OD-001)。

