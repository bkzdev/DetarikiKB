# Character Profiles (公式プロフィール辞書)
#
# Path: knowledge/dictionaries/character_profiles.yaml
# Version: 0.1
#
# knowledge/dictionaries/characters.yaml (ID解決用辞書) とは別に、
# confirmed済みcharacterIdに紐づく公式プロフィール情報 (読み仮名/所属/
# 身長/誕生日/血液型/CV/キャラ別特記事項/自己紹介文) を保持する。
#
# 詳細な設計方針は docs/architecture/06_AI/Character_Profile_Dictionary_Design.md
# を参照。characterIdはcharacters.yamlでstatus: confirmedになっている
# ものだけを参照してよい (未確認のIDに対するプロフィール登録は不可)。
#
# character-profile-import-batch-001 (feature/character-profile-import-batch-001)
# にて、docs/runbooks/Character_Profile_Wiki_Import.md の手順で取得した
# candidateのうち、characters.yamlのconfirmed済みcharacterIdとdisplayName
# が完全一致した6件 (matchStatus: matched) のみを人間確認済みとして投入
# した。unmatchedだった残り200件は投入していない (name_only/unknownの
# characterへ紐づけない方針)。selfIntroductionはWIKIのメンバー一覧
# テーブルには存在しないため、全件nullとしている。

