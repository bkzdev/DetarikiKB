# Script Commands Dictionary
# DKB Parser Phase 1 で使用する既知コマンド辞書
# Parser と Compatibility Checker で共通利用する
#
# Path: config/script_commands.yaml
# Version: 0.1

# ----------------------------------------------------------------
# speech: 会話・モノローグ系コマンド
#   Parser が本文ブロックを生成するトリガーとなるコマンド
# ----------------------------------------------------------------
speech:
  - "@ChTalk"           # 通常セリフ (音声あり)
  - "@ChTalkMono"       # モノローグ (音声あり)
  - "@ChTalkSoundOff"   # 音声なしセリフ
  - "@ChTalkSoundOffMono"  # 音声なしモノローグ
  - "@ChTalkName"       # コマンド内に話者名を持つセリフ

# ----------------------------------------------------------------
# speaker_assignment: 話者スロット割り当て系
#   キャラクター番号・スロット・強制話者名を設定するコマンド
# ----------------------------------------------------------------
speaker_assignment:
  - "@ScenarioCos"      # スロットへ直接キャラクター割り当て
  - "@ScenarioCosLoad"  # 変数経由でスロットへ割り当て
  - "name"              # 強制話者名設定

# ----------------------------------------------------------------
# variable_assignment: 変数割り当て系
#   キャラクター番号の変数割り当て
# ----------------------------------------------------------------
variable_assignment:
  - "$num"    # $numX = character_id
  - "$value"  # $valueX = character_id

# ----------------------------------------------------------------
# choice: 分岐・選択肢系
# ----------------------------------------------------------------
choice:
  - "branch"   # 選択肢テキスト定義
  - "#if"      # 分岐開始
  - "#elseif"  # 分岐追加条件
  - "#else"    # デフォルト分岐
  - "#endif"   # 分岐終了

# ----------------------------------------------------------------
# narration: ナレーション・地の文
# ----------------------------------------------------------------
narration:
  - "msg"  # ナレーション

# ----------------------------------------------------------------
# stage_direction: 演出・背景・カメラ・モーション等
#   Phase 1 では完全解析せず stage_direction として保持
# ----------------------------------------------------------------
stage_direction:
  - "bg"                   # 背景設定
  - "bgm"                  # BGM
  - "se"                   # 効果音
  - "@FaceLow"             # 立ち絵表情
  - "@Visible"             # 表示
  - "@VisibleOff"          # 非表示 (正規形)
  - "@Visibleoff"          # 非表示 (表記ゆれ)
  - "@ChCamera"            # カメラ
  - "@ChCameraOff"         # カメラオフ (正規形)
  - "@ChCameraoff"         # カメラオフ (表記ゆれ)
  - "@MotionReset"         # モーションリセット
  - "@TalkPos"             # 会話位置設定
  - "@TalkPosLLL"          # 会話位置左端
  - "@TalkPosRRR"          # 会話位置右端
  - "@ChCharaEye"          # キャラ視線設定
  - "@ChCharaEyeOff"       # キャラ視線オフ (正規形)
  - "@ChCharaEyeoff"       # キャラ視線オフ (表記ゆれ)
  - "@Smartphone"          # スマートフォン表示
  - "@SmartphoneOff"       # スマートフォン非表示 (正規形)
  - "@Smartphoneoff"       # スマートフォン非表示 (表記ゆれ)
  - "@VideoLoad"           # 動画読み込み
  - "@VideoPlay"           # 動画再生
  - "segmentCorrection"    # セグメント補正
  - "visibleAccessory"     # アクセサリ表示
  # 実データdry-run trialで見つかった演出コマンド群
  # (docs/runbooks/Real_Data_Dry_Run_Result_Template.md §3.2)。
  # agents/parser/tokenizer.py の KEYWORD_TOKENS と
  # agents/parser/parser.py の DIRECTION_TYPE_MAP に対で追加すること。
  - "ch"                   # カメラ対象キャラクタースロット
  - "pos"                  # カメラ位置
  - "euler"                # カメラ回転
  - "fov"                  # カメラ画角
  - "camera"               # カメラ切替
  - "nf"                   # カメラ near/far クリップ
  - "light"                # ライティング
  - "@TalkCamera3"         # 会話カメラ (バリエーション3)
  - "@TalkCamera4"         # 会話カメラ (バリエーション4)
  - "mo"                   # モーション指定
  - "@MotionWait"          # モーション待機
  - "sound"                # 効果音再生
  - "vo"                   # ボイス再生
  - "ui"                   # UI表示切替
  - "wType"                # ウィンドウタイプ
  - "wset"                 # ウィンドウ/prefab設定
  - "click"                # クリック待機
  - "hide"                 # 非表示
  - "visible"              # 表示切替
  - "scale"                # スケール変更
  - "color"                # 色調変更
  - "active"               # アクティブ状態切替
  - "parent"                # オブジェクトの親子付け
  - "@ChColor2"            # キャラクター色調 (バリエーション2)
  - "@ChColor2off"         # キャラクター色調オフ
  - "rdraw"                # 画面全体の描画演出 (フェード等)
  - "screen"               # 画面全体の演出指定
  - "@FadeOutWhite"        # 画面フェードアウト (白)
  - "@TalkFadeIn"          # 会話フェードイン
  - "@DoubleScreen"        # 画面分割演出
  - "uniq"                 # シーン固有識別子
  - "set"                  # 汎用フラグ/変数設定
  - "prefab"               # prefabアセット読み込み
  - "remove"               # オブジェクト削除
  - "loading"              # ローディング状態フラグ
  - "wait"                 # 待機
  - "@IsLoading"           # ローディング判定
  - "image"                # 画像アセット読み込み
  - "distance"             # カメラ距離
  - "shake"                # 画面/カメラ揺れ演出

# ----------------------------------------------------------------
# ignored: 無視する行・コマンド
#   空行は tokenizer 側で処理するが辞書にも記録しておく
# ----------------------------------------------------------------
ignored:
  - ""  # 空行

# ----------------------------------------------------------------
# case_variants: 表記ゆれの対応関係
#   raw → normalized への正規化テーブル
# ----------------------------------------------------------------
case_variants:
  "@Visibleoff": "@VisibleOff"
  "@ChCameraoff": "@ChCameraOff"
  "@ChCharaEyeoff": "@ChCharaEyeOff"
  "@Smartphoneoff": "@SmartphoneOff"
  "@SmartphoneOff": "@SmartphoneOff"

# ----------------------------------------------------------------
# new_speech_detection_hints: 新規会話コマンド候補の検出ヒント
#   コマンド名にこれらの文字列が含まれる場合、会話系候補として扱う
# ----------------------------------------------------------------
new_speech_detection_hints:
  name_contains:
    - "Talk"
    - "Mono"
    - "Name"
    - "Voice"
    - "Speech"
    - "Speak"
