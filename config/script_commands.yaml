# Script Commands Dictionary
# DKB Parser Phase 1 で使用する既知コマンド辞書
# Parser と Compatibility Checker で共通利用する
#
# Path: config/script_commands.yaml
# Version: 0.1

# ----------------------------------------------------------------
# speech: 会話・モノローグ系コマンド
#   Parser が本文ブロックを生成するトリガーとなるコマンド
# ----------------------------------------------------------------
speech:
  - "@ChTalk"           # 通常セリフ (音声あり)
  - "@ChTalkMono"       # モノローグ (音声あり)
  - "@ChTalkSoundOff"   # 音声なしセリフ
  - "@ChTalkSoundOffMono"  # 音声なしモノローグ
  - "@ChTalkName"       # コマンド内に話者名を持つセリフ
  # script-command-dictionary-spinetalk-variant-only-batch: @ChTalkと同型の
  # セリフコマンド (`@SpineTalk $numN <voice/textアセット参照path>`、
  # character/配下の`_spine`変種および同梱finish系ファイルにのみ出現)。
  # agents/parser/parser.py の発話コマンド処理 (@ChTalk系と同じ経路) と
  # 対で追加。
  - "@SpineTalk"

# ----------------------------------------------------------------
# speaker_assignment: 話者スロット割り当て系
#   キャラクター番号・スロット・強制話者名を設定するコマンド
# ----------------------------------------------------------------
speaker_assignment:
  - "@ScenarioCos"      # スロットへ直接キャラクター割り当て
  - "@ScenarioCosLoad"  # 変数経由でスロットへ割り当て
  - "name"              # 強制話者名設定

# ----------------------------------------------------------------
# variable_assignment: 変数割り当て系
#   キャラクター番号の変数割り当て
# ----------------------------------------------------------------
variable_assignment:
  - "$num"    # $numX = character_id
  - "$value"  # $valueX = character_id
  # script-command-dictionary-expansion-batch-002: 値が character_id(数字)ではなくモーションクリップ名や$state()呼び出しになっている$numX/$valueXの個別インデックス。standalone checker(scripts/check_script_compatibility.py)の既知コマンド集合は完全一致で判定するため、出現した番号を個別登録する。実parser (agents/parser/parser.py)は正規表現ベースで既に汎用対応済みのため変更不要。
  - "$num0"
  - "$num9"
  - "$value0"
  - "$value1"
  - "$value2"
  - "$value3"
  - "$value6"
  # script-command-dictionary-h-scene-parse-target-batch: character/配下の
  # パース対象ファイル(H_sceneN本体・H_scene_s・episodeN/episode_EX)で
  # 見つかった$numX/$valueXの個別インデックス8種+$common0。standalone
  # checker(scripts/check_script_compatibility.py)の既知コマンド集合は
  # 完全一致で判定するため個別登録する。実parser (agents/parser/parser.py)
  # は正規表現ベースで既に汎用対応済みのため変更不要。$common0は既存の
  # $num/$value(キャラ/コスチュームID系)とは別系統の可能性があるため、
  # character-id sourceとしては扱わず、既知の変数トークンとしてのみ登録する。
  - "$num1"
  - "$num2"
  - "$num3"
  - "$num4"
  - "$num5"
  - "$num6"
  - "$value7"
  - "$value10"
  - "$common0"
  # script-command-dictionary-spinetalk-variant-only-batch: character/配下の
  # variant-onlyファイル(パース対象外の`_n`/`_VR`/`_spine`/`#N`変種、および
  # camera/finish/episode_bgm等の純コマンド演出ファイル)にのみ出現する
  # $valueX個別インデックス3種+$common/$common1〜3+$return。standalone
  # checker(scripts/check_script_compatibility.py)の既知コマンド集合は
  # 完全一致で判定するため個別登録する。実データでは$value4=414970 (アセット
  # ID)・$value9=$state(Name,$value10) (表示名候補文字列)・$value11 (フラグ
  # 値)・$common/$common1〜3 (浮動小数点値)・$return=$state(...) (条件分岐用
  # 一時変数) のいずれもcharacter-id系ではないことを確認した上で、既知の
  # 変数トークンとしてのみ登録する。実parser (agents/parser/parser.py) は
  # $valueXを正規表現ベースで既に汎用対応済みのため変更不要。$common/
  # $common1〜3/$returnは$num/$valueプレフィックスと異なる別系統のため、
  # parser.py側でも(既存の$common0同様)VARIABLEトークンとして消費される
  # だけでスロット割り当ては発生しない (変更不要)。
  - "$value4"
  - "$value9"
  - "$value11"
  - "$common"
  - "$common1"
  - "$common2"
  - "$common3"
  - "$return"

# ----------------------------------------------------------------
# choice: 分岐・選択肢系
# ----------------------------------------------------------------
choice:
  - "branch"   # 選択肢テキスト定義
  - "#if"      # 分岐開始
  - "#elseif"  # 分岐追加条件
  - "#else"    # デフォルト分岐
  - "#endif"   # 分岐終了

# ----------------------------------------------------------------
# narration: ナレーション・地の文
# ----------------------------------------------------------------
narration:
  - "msg"  # ナレーション

