name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # pyproject.toml の requires-python (>=3.12) に合わせる。
          # ユーザー指示は3.10だったが、requires-python制約と矛盾するため
          # 実際にプロジェクトが要求する3.12を採用した。
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --locked

      - name: Run pytest
        run: uv run pytest

      - name: Check invisible unicode
        run: uv run python scripts/check_invisible_unicode.py

      - name: Check dry-run inputs safety
        run: uv run python scripts/check_dry_run_inputs.py

      - name: Ruff format check
        run: uv run ruff format scripts agents tests --check

      - name: Ruff check
        run: uv run ruff check scripts agents tests

      - name: MkDocs build (strict, site_preview only)
        run: uv run mkdocs build --strict --site-dir /tmp/mkdocs_ci_build
